<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Viral</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    button {
      width: 90%;
      padding: 15px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #1f1f1f;
      color: #fff;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <header>🔥 App Viral</header>

  <div class="container">
    <button onclick="abrir('quiz')">🧠 Quiz</button>
    <button onclick="abrir('frases')">💬 Frases</button>
    <button onclick="abrir('sorte')">🔮 Sorte do dia</button>
  </div>

  <script>
    function abrir(tipo){
      alert("Você clicou em: " + tipo);
    }
  </script>

</body>
</html>

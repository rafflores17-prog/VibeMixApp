<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeMix</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>🔥 VibeMix</header>

  <!-- HOME -->
  <div id="home" class="container tela ativa">
    <button onclick="abrir('quiz')">🧠 Quiz</button>
    <button onclick="abrir('frases')">💬 Frases</button>
    <button onclick="abrir('sorte')">🔮 Sorte do dia</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="container tela">
    <h2>🧠 Quiz</h2>
    <p>Em breve...</p>
    <button class="voltar" onclick="voltar()">⬅ Voltar</button>
  </div>

  <!-- FRASES -->
  <div id="frases" class="container tela">
    <h2>💬 Frases</h2>

    <p id="textoFrase">Clique no botão para gerar uma frase</p>

    <button onclick="gerarFrase()">✨ Gerar frase</button>
    <button onclick="copiarFrase()">📋 Copiar</button>

    <button class="voltar" onclick="voltar()">⬅ Voltar</button>
  </div>

  <!-- SORTE -->
  <div id="sorte" class="container tela">
    <h2>🔮 Sorte do dia</h2>
    <p id="textoSorte">Clique para ver sua sorte</p>

    <button onclick="gerarSorte()">🔮 Ver sorte</button>

    <button class="voltar" onclick="voltar()">⬅ Voltar</button>
  </div>

  <script src="script.js"></script>
</body>
</html>

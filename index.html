<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeMix</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header>🔥 VibeMix</header>

<!-- MENU -->
<div class="menu">
  <button onclick="mudarCategoria('motivacao')">✨ Motivação</button>
  <button onclick="mudarCategoria('zoeira')">😂 Zoeira</button>
  <button onclick="mudarCategoria('bomdia')">🌅 Bom dia</button>
  <button onclick="mudarCategoria('indireta')">😏 Indireta</button>
</div>

<div class="container">

  <div class="card">
    <p id="textoFrase">Carregando frases incríveis... 🔥</p>
  </div>

  <p id="views">🔥 0 visualizações</p>

  <button onclick="gerarFrase()">✨ Nova frase</button>
  <button onclick="compartilhar()">📤 Compartilhar no WhatsApp</button>
  <button onclick="salvarFavorito()">❤️ Favoritar</button>

</div>

<script src="script.js"></script>

</body>
</html>

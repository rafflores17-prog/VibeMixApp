<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeMix</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      background: #1a1a1a;
    }

    .container {
      padding: 20px;
    }

    button {
      width: 90%;
      padding: 15px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #1f1f1f;
      color: #fff;
    }

    button:hover {
      background: #333;
    }

    .tela {
      display: none;
    }

    .ativa {
      display: block;
    }

    .voltar {
      margin-top: 20px;
      background: #444;
    }
  </style>
</head>

<body>

  <header>🔥 VibeMix</header>

  <!-- HOME -->
  <div id="home" class="container tela ativa">
    <button onclick="abrir('quiz')">🧠 Quiz</button>
    <button onclick="abrir('frases')">💬 Frases</button>
    <button onclick="abrir('sorte')">🔮 Sorte do dia</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="container tela">
    <h2>🧠 Quiz</h2>
    <p>Em breve...</p>
    <button class="voltar" onclick="voltar()">⬅ Voltar</button>
  </div>

  <!-- FRASES -->
  <div id="frases" class="container tela">
    <h2>💬 Frases</h2>
    <p>Em breve...</p>
    <button class="voltar" onclick="voltar()">⬅ Voltar</button>
  </div>

  <!-- SORTE -->
  <div id="sorte" class="container tela">
    <h2>🔮 Sorte do dia</h2>
    <p>Em breve...</p>
    <button class="voltar" onclick="voltar()">⬅ Voltar</button>
  </div>

  <script>
    function abrir(id){
      document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
      document.getElementById(id).classList.add('ativa');
    }

    function voltar(){
      abrir('home');
    }
  </script>

</body>
</html>
